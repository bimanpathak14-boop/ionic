<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket AI Office Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span { font-size: 11px; color: #888; }

    .close-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      font-size: 16px;
    }

    .close-btn:hover { background: #e74c3c; color: #fff; }

    .status-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e74c3c;
      box-shadow: 0 0 8px rgba(231,76,60,0.5);
    }

    .status-dot.online {
      background: #2ecc71;
      box-shadow: 0 0 8px rgba(46,204,113,0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text { font-weight: 500; }
    .status-info { font-size: 13px; color: #888; line-height: 1.6; }

    .pair-section {
      -webkit-app-region: no-drag;
      flex: 1;
    }

    .pair-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #667eea;
    }

    .btn-pair {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 8px;
    }

    .btn-pair:hover { transform: scale(1.02); }
    .btn-pair:active { transform: scale(0.98); opacity: 0.9; }

    .tasks-section {
      margin-top: 20px;
    }

    .tasks-section h3 { font-size: 13px; color: #888; margin-bottom: 10px; }

    .task-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .task-item .task-type { color: #667eea; font-weight: 500; }
    .task-item .task-status { float: right; color: #2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar">
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
          <h1>Pocket AI Office</h1>
          <span>Desktop Agent v1.0</span>
        </div>
      </div>
      <button class="close-btn" onclick="window.close()">✕</button>
    </div>

    <div class="status-card">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Disconnected</span>
      </div>
      <div class="status-info" id="statusInfo">
        Pair with your mobile device to get started.
      </div>
    </div>

    <div class="pair-section" id="pairSection">
      <h2>🔗 Connect to Server</h2>
      <div class="input-group">
        <label>Server URL</label>
        <input type="text" id="serverUrl" value="http://localhost:3001" />
      </div>
      <div class="input-group">
        <label>Auth Token</label>
        <input type="password" id="authToken" placeholder="Paste your auth token" />
      </div>
      <div class="input-group">
        <label>Pairing Code</label>
        <input type="text" id="pairingCode" placeholder="6-digit code from mobile app" maxlength="6" />
      </div>
      <button class="btn-pair" id="pairBtn" onclick="pair()">Pair Device</button>
    </div>

    <div class="tasks-section" id="tasksSection" style="display:none">
      <h3>Recent Tasks</h3>
      <div id="tasksList"></div>
    </div>
  </div>

  <script>
    async function pair() {
      const serverUrl = document.getElementById('serverUrl').value;
      const token = document.getElementById('authToken').value;
      const code = document.getElementById('pairingCode').value;
      if (!serverUrl || !token || !code) return;

      document.getElementById('pairBtn').textContent = 'Pairing...';
      const result = await window.electronAPI.pairDevice({ serverUrl, pairingCode: code, token });

      if (result.device) {
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusText').textContent = 'Connected';
        document.getElementById('statusInfo').textContent = `Device: ${result.device.name} | ID: ${result.device.id.slice(0,8)}...`;
        document.getElementById('pairSection').style.display = 'none';
        document.getElementById('tasksSection').style.display = 'block';
      } else {
        document.getElementById('pairBtn').textContent = 'Pair Device';
        alert('Pairing failed: ' + (result.error || 'Unknown error'));
      }
    }

    // Check if already paired on load
    window.addEventListener('DOMContentLoaded', async () => {
      const config = await window.electronAPI.getConfig();
      if (config.deviceId && config.isConnected) {
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusText').textContent = 'Connected';
        document.getElementById('pairSection').style.display = 'none';
        document.getElementById('tasksSection').style.display = 'block';
      }
    });
  </script>
</body>
</html>
